<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL CHART</title>
    <style>
        :root { --dark-green: #004d40; --gold: #FFD700; --theme-red: #d32f2f; }
        body { background: #f4f4f4; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        .ticker-wrap { width: 100%; background: #000; color: #fff; padding: 8px 0; border-bottom: 2px solid var(--gold); font-size: 14px; font-weight: bold; overflow: hidden; }
        .ticker-wrap span { color: var(--gold); }

        .master-box { background: var(--dark-green); margin: 20px auto; width: 90%; padding: 15px; border: 2px solid var(--gold); border-radius: 10px; color: #fff; }
        .master-val { font-size: 30px; font-weight: 900; color: var(--gold); }

        .vip-table { border-collapse: collapse; width: 95%; margin: 10px auto; background: #fff; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 12px; padding: 10px; border: 1px solid #ccc; }
        .vip-table td { border: 1px solid #ccc; height: 50px; text-align: center; font-weight: bold; }
        
        .date-cell { background: #eee !important; font-size: 12px; }
        .j-main { font-size: 20px; color: #000; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL CHART</h1></div>

<div class="ticker-wrap">
    <marquee>GOA SPECIAL CHART का आज का गेम अपडेट हो गया है! <span>सभी जानकारी सटीक है।</span></marquee>
</div>

<div class="master-box">
    <div class="master-title">GOA SPECIAL CHART RESULT</div>
    <div class="master-val" id="vipVal">---</div>
</div>

<div class="chart-wrapper">
    <table class="vip-table">
        <thead>
            <tr>
                <th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="chartGrid"></tbody>
    </table>
</div>

<script>
    // कोड की कार्यक्षमता पहले जैसी ही रखी गई है
    const v = Math.random();
    const CHART_URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart&v=" + v;

    fetch(CHART_URL).then(r => r.text()).then(data => {
        const rows = data.split('\n').filter(r => r.trim() !== '');
        let html = '';
        for(let i = 1; i < rows.length; i++) {
            let cols = rows[i].split(',');
            html += `<tr><td class="date-cell">${cols[0].replace(/"/g, '')}</td>`;
            for(let j = 1; j <= 16; j += 3) {
                let val = (cols[j+1] || "").replace(/"/g, '');
                html += `<td><div class="j-main">${val === "" ? "-" : val}</div></td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('chartGrid').innerHTML = html;
    });
</script>
</body>
</html>
