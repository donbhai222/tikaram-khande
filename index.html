<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    
    <title>GOA SPECIAL VIP CHART | GOA SPECIAL VIP CHART - Fast Results</title>
    <meta name="description" content="GOA SPECIAL VIP CHART और GOA SPECIAL VIP CHART पर सबसे तेज़ और सटीक सट्टा मटका चार्ट रिजल्ट्स देखें। आज का वीआईपी गेम पाने के लिए अभी विजिट करें।">
    
    <style>
        :root { 
            --dark-green: #004d00; 
            --deep-green: #003300;
            --gold: #FFD700; 
            --vip-red: #e31e24; 
            --grid-border: #006400; 
        }
        
        body { 
            background: #002600; /* Dark Green Background */
            color: #ffffff; 
            font-family: 'Arial Narrow', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 50px; 
            overflow-x: hidden; 
        }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        .special-note { background: #004d00; color: #fff; padding: 12px; margin: 15px auto; width: 90%; border-left: 5px solid var(--gold); border-radius: 4px; text-align: left; box-sizing: border-box; }
        .special-note p { margin: 0; font-size: 14px; line-height: 1.5; }

        .nav-btn { background: var(--vip-red); color: white; border: 1.5px solid #fff; border-radius: 20px; padding: 8px 20px; display: inline-block; font-size: 12px; margin: 10px 0; font-weight: bold; cursor: pointer; }

        #chartWrapper { width: 90%; margin: 10px auto; background: #fff; border: 2px solid var(--gold); overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 300px; table-layout: fixed; }
        th { background: var(--dark-green); color: var(--gold); font-size: 11px; padding: 8px 0; border: 1px solid var(--grid-border); }
        td { border: 1px solid var(--grid-border); height: 50px; background: #ffffff; vertical-align: middle; text-align: center; padding: 0; }
        
        .date-box { background: #e0e0e0 !important; font-size: 10px; font-weight: bold; color: #000; width: 45px !important; }
        .cell-content { display: flex; align-items: center; justify-content: center; width: 100%; color: #000; }
        .panna-vertical { display: flex; flex-direction: column; font-size: 8px; line-height: 0.9; width: 10px; font-weight: bold; }
        .jodi { font-size: 18px; font-weight: 900; margin: 0 4px; }
        .red-house .jodi, .red-house .panna-vertical { color: var(--vip-red) !important; }
        
        .btn-pay-main { background: var(--vip-red); color: white; padding: 12px; border: none; border-radius: 6px; width: 90%; font-weight: bold; font-size: 16px; margin: 10px 0; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 350px; padding: 20px; border-radius: 10px; color: #000; }
        
        .sub-option { border: 2px solid #ddd; border-radius: 8px; padding: 10px; margin: 10px 0; cursor: pointer; }
        .sub-option.active { border-color: var(--dark-green); background: #e8f5e9; }
        .sub-title-hi { font-size: 14px; font-weight: bold; display: block; }
        .sub-price { color: var(--dark-green); font-weight: 900; font-size: 20px; display: block; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL VIP CHART</h1></div>

<div class="special-note">
    <p><strong>विशेष सूचना:</strong> सटीक जानकारी के लिए BOMBAY SPECIAL VIP CHART ही चुनें।</p>
</div>

<div class="nav-btn" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});">Go to Bottom ↓</div>

<div id="chartWrapper">
    <table>
        <thead>
            <tr>
                <th style="width:45px;">DATE</th>
                <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="gridData"></tbody>
    </table>
</div>

<div class="nav-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">Go to Top ↑</div>

<button class="btn-pay-main" onclick="openVipModal()">JOIN VIP / लॉक खोलें 🔑</button>

<!-- Modal remains same as your original, just styled with the new CSS -->

    <div class="modal-content">

        <div id="step1">

            <input type="text" id="vName" placeholder="अपना नाम लिखें">
            <input type="number" id="vPhone" placeholder="मोबाइल नंबर">
            <button class="btn-pay-main" style="width:100%;" onclick="goSub()">NEXT / आगे बढ़ें</button>
        </div>
        <div id="step-sub" style="display:none;">
            <h3>Select Plan / प्लान चुनें</h3>
            <div class="sub-option" onclick="selectPlan(this, '1 Day VIP - ₹999')">
                <span class="sub-title-hi">1 दिन के लिए लॉक खोलें (1 Day access)</span>
                <span class="sub-price">₹999</span>
            </div>
            <div class="sub-option" onclick="selectPlan(this, '7 Days VIP - ₹1999')">
                <span class="sub-title-hi">7 दिनों के लिए लॉक खोलें (7 Days access)</span>
                <span class="sub-price">₹1999</span>
            </div>
            <button class="btn-pay-main" style="width:100%;" onclick="goPay()">NEXT / आगे बढ़ें</button>
        </div>
        <!-- Add rest of the steps as per your original code -->
    </div>
</div>

<script>

</script>
</body>
</html>
