<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>BOMBAY SPECIAL VIP CHART</title>
    <style>
        :root { --dark-blue: #1a024d; --gold: #FFD700; --vip-red: #e31e24; --grid-border: #000; }
        body { background: #FFBF82; color: var(--dark-blue); font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--dark-blue); padding: 15px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 18px; color: var(--gold); text-transform: uppercase; }

        #chartWrapper { width: 90%; margin: 20px auto; background: #fff; border: 1px solid #000; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; min-width: 300px; }
        th { background: #ffff00; color: #000; font-size: 10px; padding: 6px; border: 1px solid #000; }
        td { border: 1px solid #000; height: 50px; background: #fff; text-align: center; }
        
        .btn-pay-main { background: var(--vip-red); color: white; padding: 15px; border: none; border-radius: 6px; width: 90%; font-weight: bold; font-size: 16px; margin: 20px 0; cursor: pointer; }
        
        /* Modal Style */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 90%; max-width: 350px; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>BOMBAY SPECIAL VIP CHART</h1></div>

<div id="chartWrapper">
    <table>
        <thead><tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
        <tbody id="gridData"><tr><td colspan="7">Loading...</td></tr></tbody>
    </table>
</div>

<button class="btn-pay-main" onclick="openVipModal()">JOIN VIP / लॉक खोलें 🔑</button>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <h3>Registration</h3>
        <input type="text" placeholder="अपना नाम" style="width:90%; padding:10px; margin:10px 0;">
        <button class="btn-pay-main" style="width:100%" onclick="closeVipModal()">CLOSE</button>
    </div>
</div>

<script>
    const CSV = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv&gid=0";
    
    function openVipModal() { document.getElementById('vipModal').style.display='flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display='none'; }

    async function loadChart() {
        try {
            const res = await fetch(CSV + "?cache=" + Date.now());
            const data = await res.text();
            const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
            let html = '';
            // i=1 से शुरू करें ताकि हेडर न बदले
            for(let i=1; i<rows.length; i++) {
                html += `<tr><td>${rows[i][0] || ""}</td>`;
                for(let j=1; j<=6; j++) {
                    html += `<td>${rows[i][j] || ""}</td>`;
                }
                html += `</tr>`;
            }
            document.getElementById('gridData').innerHTML = html;
        } catch(e) { console.error(e); }
    }
    window.onload = loadChart;
</script>
</body>
</html>
