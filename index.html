<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL VIP CHART</title>
    <style>
        :root { --dark-green: #064e3b; --gold: #FFD700; --vip-red: #e31e24; }
        body { background: #f0fdf4; font-family: 'Arial Narrow', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        /* Chart Table Layout */
        .chart-wrapper { width: 95%; margin: 15px auto; overflow-x: auto; background: #fff; border: 2px solid var(--dark-green); }
        .vip-table { border-collapse: collapse; width: 100%; min-width: 320px; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 11px; padding: 8px; border: 1px solid #000; }
        .vip-table td { border: 1px solid #000; height: 45px; background: #fff; text-align: center; padding: 2px; }
        
        .date-cell { background: #e0f2f1 !important; font-weight: bold; font-size: 11px; }
        .j-main { font-size: 18px; font-weight: 900; color: #000; }
        
        /* Buttons & Extras */
        .btn-unlock { background: var(--dark-green); color: var(--gold); padding: 12px 25px; border-radius: 30px; font-weight: bold; border: 2px solid var(--gold); cursor: pointer; margin: 15px; }
        .nirdesh { background: #fff; border: 2px solid var(--dark-green); padding: 10px; margin: 15px auto; width: 90%; border-radius: 8px; text-align: left; font-size: 13px; }
        
        /* Modal & Timer */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL VIP CHART</h1></div>

<div class="chart-wrapper">
    <table class="vip-table">
        <thead>
            <tr>
                <th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
            </tr>
        </thead>
        <tbody id="chartGrid"></tbody>
    </table>
</div>

<button class="btn-unlock" onclick="openStep1()">🔓 REMOVE LOCK</button>

<div class="nirdesh">
    <h4>⚠️ विशेष निर्देश</h4>
    <p>1. पेमेंट के बाद UTR/Transaction ID डालना न भूलें।<br>2. 2 मिनट इंतज़ार करें, ऑटोमैटिक Success दिखेगा।<br>3. गेम अपने रिस्क पर खेलें।</p>
</div>

<script>
    const CHART_URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart";

    fetch(CHART_URL).then(r => r.text()).then(data => {
        const rows = data.split('\n');
        let html = '';
        // यहाँ से आपका पुराना टेबल रेंडरिंग लॉजिक काम करेगा
        rows.forEach((row, index) => {
            if(index === 0) return; // हेडर छोड़ें
            let cols = row.split(',');
            if(cols.length < 7) return;
            html += `<tr>
                <td class="date-cell">${cols[0].replace(/"/g, '')}</td>
                <td><div class="j-main">${cols[1].replace(/"/g, '')}</div></td>
                <td><div class="j-main">${cols[2].replace(/"/g, '')}</div></td>
                <td><div class="j-main">${cols[3].replace(/"/g, '')}</div></td>
                <td><div class="j-main">${cols[4].replace(/"/g, '')}</div></td>
                <td><div class="j-main">${cols[5].replace(/"/g, '')}</div></td>
                <td><div class="j-main">${cols[6].replace(/"/g, '')}</div></td>
            </tr>`;
        });
        document.getElementById('chartGrid').innerHTML = html;
    });

    function openStep1() { alert("Lock Opening..."); }
</script>
</body>
</html>
