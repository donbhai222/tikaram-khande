<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL CHART</title>
    <style>
        :root { --dark-green: #004d40; --gold: #FFD700; --vip-red: #d32f2f; }
        body { background: #f0f4f3; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 100px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        .ticker-wrap { width: 100%; background: #000; color: #fff; padding: 8px 0; border-bottom: 2px solid var(--gold); font-size: 14px; font-weight: bold; }
        .ticker-wrap span { color: var(--gold); }

        .master-box { background: #000; margin: 20px auto; width: 90%; padding: 15px; border: 2px solid var(--gold); border-radius: 10px; }
        .master-title { color: var(--gold); font-size: 12px; }
        .master-val { color: #fff; font-size: 30px; font-weight: 900; }

        .chart-wrapper { width: 92%; margin: 10px auto; background: #fff; border: 1px solid #000; overflow-x: auto; }
        .vip-table { border-collapse: collapse; width: 100%; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 11px; padding: 8px; border: 1px solid #000; }
        .vip-table td { border: 1px solid #000; height: 45px; text-align: center; font-weight: bold; }

        .btn-unlock { background: var(--vip-red); color: white; padding: 12px 30px; border-radius: 30px; border: 2px solid var(--gold); cursor: pointer; margin: 20px auto; font-weight: bold; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; width: 85%; max-width: 320px; }
        
        .social-sticky { position: fixed; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-social { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        
        .scroll-sticky { position: fixed; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-scroll { width: 60px; padding: 8px; background: var(--dark-green); color: var(--gold); border: 1px solid var(--gold); border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL CHART</h1></div>

<div class="ticker-wrap">
    <marquee>GOA SPECIAL CHART का आज का गेम अपडेट हो गया है! <span>💥 100% सटीक रिजल्ट यहाँ देखें। 💥</span></marquee>
</div>

<div class="master-box">
    <div class="master-title">GOA SPECIAL CHART RESULT</div>
    <div class="master-val" id="vipVal">---</div>
</div>

<div class="chart-wrapper">
    <table class="vip-table">
        <thead><tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
        <tbody id="chartGrid"></tbody>
    </table>
</div>

<button class="btn-unlock" onclick="document.getElementById('m1').style.display='flex'">🔓 REMOVE LOCK</button>

<div id="m1" class="modal">
    <div class="modal-content">
        <h3>Unlock Details</h3>
        <input type="text" id="name" placeholder="Naam" style="width:90%; padding:8px; margin:5px;">
        <button onclick="next(1)" style="width:95%; padding:10px; background:var(--dark-green); color:white; border:none;">Aage Badhein</button>
    </div>
</div>

<div class="social-sticky">
    <a href="#" class="btn-social" style="background:#25D366;">WA</a>
    <a href="#" class="btn-social" style="background:#0088cc;">TG</a>
</div>

<div class="scroll-sticky">
    <button class="btn-scroll" onclick="window.scrollTo(0,0)">TOP</button>
    <button class="btn-scroll" onclick="window.scrollTo(0,document.body.scrollHeight)">BOTTOM</button>
</div>

<script>
    // चार्ट लोड करने का लॉजिक
    const v = Math.random();
    const URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart&v=" + v;

    fetch(URL).then(r => r.text()).then(data => {
        const rows = data.split('\n').filter(r => r.trim() !== '');
        let html = '';
        for(let i = 1; i < rows.length; i++) {
            let cols = rows[i].split(',');
            html += `<tr><td style="background:#eee;">${cols[0].replace(/"/g, '')}</td>`;
            for(let j = 1; j <= 16; j += 3) {
                let val = (cols[j+1] || "").replace(/"/g, '');
                html += `<td>${val === "" ? "-" : val}</td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('chartGrid').innerHTML = html;
    });

    function next(s) { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none');
        if(s==1) alert("Payment Section..."); 
    }
</script>
</body>
</html>
