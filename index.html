<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL VIP CHART</title>
    <style>
        :root { --dark-green: #0a3d0a; --gold: #FFD700; --vip-red: #e31e24; }
        body { background: #e8f5e9; font-family: 'Arial Narrow', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 22px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }

        .ticker-wrap { width: 100%; background: #000; color: #fff; padding: 6px 0; border-bottom: 2px solid var(--gold); font-size: 13px; font-weight: bold; overflow: hidden; }
        
        /* CENTERED DESCRIPTION BOX */
        .desc-box { 
            background: var(--dark-green); 
            color: #fff; 
            width: 90%; 
            margin: 20px auto; 
            padding: 20px; 
            border-radius: 15px; 
            border: 3px solid var(--gold); 
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .desc-box h3 { margin: 0 0 10px 0; color: var(--gold); font-size: 18px; text-transform: uppercase; }
        .desc-box ul { list-style: none; padding: 0; font-size: 15px; }
        .desc-box ul li { margin: 8px 0; font-weight: bold; }

        .chart-wrapper { width: 90%; margin: 20px auto; }
        .chart-container { background: #fff; border: 2px solid var(--dark-green); overflow-x: auto; }
        .vip-table { border-collapse: collapse; width: 100%; min-width: 320px; table-layout: fixed; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 12px; padding: 10px 0; border: 1px solid #000; }
        .vip-table td { border: 1px solid #000; height: 50px; background: #fff; vertical-align: middle; text-align: center; padding: 0; }
        
        .date-cell { background: #f0f0f0 !important; font-size: 11px; font-weight: bold; width: 65px !important; }
        .j-main { font-size: 22px; font-weight: 900; color: #000; }
        .single-lock-cell { background: #fff5f5 !important; cursor: pointer; color: var(--vip-red); font-weight: bold; }
        
        .instruction-box { background: #fff; color: var(--dark-green); width: 90%; margin: 20px auto; padding: 15px; border-radius: 8px; border: 2px dashed var(--dark-green); font-weight: bold; }
        .btn-unlock-trigger { background: var(--vip-red); color: white; font-size: 16px; font-weight: bold; padding: 15px 30px; border-radius: 30px; cursor: pointer; border: 2px solid var(--gold); margin: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL VIP CHART</h1></div>

<div class="desc-box">
    <h3>📢 Hamari Vishesh Sewa</h3>
    <ul>
        <li>✅ 100% Sahi aur Tez Result.</li>
        <li>✅ Expert dwara taiyar VIP Game.</li>
        <li>✅ 24/7 Bharosemand Sewa.</li>
    </ul>
</div>

<div class="chart-wrapper">
    <div class="chart-container">
        <table class="vip-table">
            <thead>
                <tr><th style="width:65px;">DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr>
            </thead>
            <tbody id="chartGrid"></tbody>
        </table>
    </div>
</div>

<div class="instruction-box">
    🔒 Chart unlock karne ke liye niche click karein.
</div>

<button class="btn-unlock-trigger" onclick="alert('Step 1 open...')">🔓 REMOVE LOCK</button>

<script>
    // Chart Render Logic
    const CHART_URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart&v=" + Math.random();
    fetch(CHART_URL).then(r => r.text()).then(data => {
        const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
        let html = '';
        for(let i = 1; i < rows.length; i++) {
            let d = rows[i][0].replace(/"/g, '');
            html += `<tr><td class="date-cell">${d}</td>`;
            for(let j = 1; j <= 16; j += 3) {
                let jd = (rows[i][j+1] || "").replace(/"/g, '').trim();
                if(i === 1 && j === 1) html += `<td class="single-lock-cell">🔒 VIP</td>`;
                else html += `<td><div class="j-main">${jd}</div></td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('chartGrid').innerHTML = html;
    });
</script>
</body>
</html>
