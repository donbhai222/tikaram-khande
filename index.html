<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA PINAL CHART | VIP Results</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-bg: #111111;
            --gold: #FFD700;
            --red: #ff0000;
            --white: #ffffff;
            --border: #333333;
        }

        body { 
            background: var(--bg-black); 
            color: var(--white); 
            font-family: 'Arial Black', sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
            text-align: center;
        }
        
        .header { 
            background: linear-gradient(to bottom, #222, #000); 
            padding: 20px; 
            border-bottom: 4px solid var(--gold); 
        }
        .header h1 { 
            color: var(--gold); 
            margin: 0; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        #chartWrapper { 
            width: 95%; 
            margin: 20px auto; 
            background: var(--card-bg); 
            border: 2px solid var(--gold); 
            padding: 5px; 
            border-radius: 5px; 
            overflow-x: auto;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 350px; }
        th { 
            background: var(--gold); 
            color: #000; 
            padding: 12px 5px; 
            font-size: 12px; 
            border: 1px solid #000; 
        }
        td { 
            border: 1px solid var(--border); 
            height: 50px; 
            text-align: center; 
            background: var(--card-bg); 
        }
        
        .jodi { color: var(--white); font-size: 20px; font-weight: 900; }
        .red-house .jodi { color: var(--red); }
        .date-box { background: #222 !important; color: var(--gold); font-size: 11px; }
        
        .btn-pay-main { 
            background: linear-gradient(to bottom, #d4af37, #b8860b); 
            color: #000; 
            border: none; 
            padding: 15px 40px; 
            font-weight: 900; 
            font-size: 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(255,215,0,0.3);
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 350px; padding: 20px; border-radius: 10px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div class="header"><h1>GOA PINAL CHART</h1></div>

<div id="chartWrapper">
    <table>
        <thead>
            <tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr>
        </thead>
        <tbody id="gridData"></tbody>
    </table>
</div>

<button class="btn-pay-main" onclick="openVipModal()">JOIN VIP / लॉक खोलें 🔑</button>

<div id="vipModal" class="overlay">
    <div class="modal-content">
        <h3 style="color:var(--gold);">Registration</h3>
        <input type="text" id="vName" placeholder="अपना नाम लिखें" style="width:100%; padding:10px; margin:10px 0;">
        <button class="btn-pay-main" style="width:100%;" onclick="closeVipModal()">CLOSE</button>
    </div>
</div>

<script>
    const CSV = "https://docs.google.com/spreadsheets/d/1IReRyQjRvWWVjZTym_8DDXvx9Jttjfgy18McY53gM5w/export?format=csv&gid=0";
    function openVipModal() { document.getElementById('vipModal').style.display='flex'; }
    function closeVipModal() { document.getElementById('vipModal').style.display='none'; }
    
    async function loadChart() {
        try {
            const res = await fetch(CSV + "&cache=" + Date.now());
            const data = await res.text();
            const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
            let html = '', lockShown = false;
            for(let i=1; i<rows.length; i++) {
                let d = (rows[i][0] || "").trim();
                html += `<tr><td class="date-box">${d}</td>`;
                for(let j=1; j<=16; j+=3) {
                    let jd=(rows[i][j+1]||"").trim();
                    if(!jd) { 
                        html += lockShown ? `<td></td>` : `<td onclick="openVipModal()">🔒</td>`;
                        lockShown = true;
                    } else {
                        let isRed = (jd.length==2 && (jd[0]==jd[1] || Math.abs(jd[0]-jd[1])==5));
                        html += `<td class="${isRed?'red-house':''}"><span class="jodi">${jd}</span></td>`;
                    }
                }
                html += `</tr>`;
            }
            document.getElementById('gridData').innerHTML = html;
        } catch(e) {}
    }
    window.onload = loadChart;
</script>
</body>
</html>
