<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL CHART</title>
    <style>
        :root { --dark-green: #004d40; --gold: #FFD700; --vip-red: #d32f2f; }
        body { background: #e0f2f1; font-family: 'Arial Narrow', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 20px; color: var(--gold); text-transform: uppercase; }

        .ticker-wrap { width: 100%; background: #000; color: #fff; padding: 6px 0; border-bottom: 2px solid var(--gold); font-size: 13px; font-weight: bold; }
        .ticker-wrap span { color: var(--gold); }

        .master-box { background: #000; margin: 15px auto; width: 90%; padding: 10px; border: 2px solid var(--gold); border-radius: 10px; }
        .master-title { color: var(--gold); font-size: 12px; font-weight: bold; }
        .master-val { color: #fff; font-size: 28px; font-weight: 900; }

        .chart-wrapper { width: 90%; margin: 10px auto; background: #fff; border: 1px solid #000; overflow-x: auto; }
        .vip-table { border-collapse: collapse; width: 100%; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 10px; padding: 6px; border: 1px solid #000; }
        .vip-table td { border: 1px solid #000; height: 50px; text-align: center; }

        .btn-unlock-trigger { background: var(--vip-red); color: white; padding: 12px 25px; border-radius: 30px; border: 2px solid var(--gold); cursor: pointer; margin: 15px auto; display: block; font-weight: bold; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 300px; text-align: center; }
        
        .social-sticky { position: fixed; bottom: 20px; left: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-social { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 20px; }
        
        .scroll-sticky { position: fixed; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-scroll { width: 70px; padding: 5px; background: var(--dark-green); color: var(--gold); border: 1px solid var(--gold); border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL CHART</h1></div>

<div class="ticker-wrap">
    <marquee>GOA SPECIAL CHART का आज का गेम तैयार है! <span>💥 100% फिक्स जोड़ी उपलब्ध है। 💥</span></marquee>
</div>

<div class="master-box">
    <div class="master-title">GOA SPECIAL CHART RESULT</div>
    <div class="master-val" id="vipVal">---</div>
</div>

<div class="chart-wrapper">
    <table class="vip-table">
        <thead><tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr></thead>
        <tbody id="chartGrid"></tbody>
    </table>
</div>

<button class="btn-unlock-trigger" onclick="openStep1()">🔓 REMOVE LOCK</button>

<div class="modal-overlay" id="modalStep1">
    <div class="modal-content">
        <h3>Unlock Chart</h3>
        <input type="text" id="userName" placeholder="Naam" style="width:90%; padding:8px; margin:5px;">
        <button onclick="openStep2()" style="width:95%; padding:10px; background:green; color:white; border:none;">Aage Badhein</button>
    </div>
</div>

<div class="social-sticky">
    <a href="#" class="btn-social" style="background:#25D366;">W</a>
    <a href="#" class="btn-social" style="background:#0088cc;">T</a>
</div>

<div class="scroll-sticky">
    <button class="btn-scroll" onclick="window.scrollTo(0,0)">TOP</button>
    <button class="btn-scroll" onclick="window.scrollTo(0,document.body.scrollHeight)">BOTTOM</button>
</div>

<script>
    function openStep1() { document.getElementById('modalStep1').style.display = 'flex'; }
    function openStep2() { alert("Next Step..."); }
    // Fetch logic...
</script>
</body>
</html>
