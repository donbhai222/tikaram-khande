<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>GOA SPECIAL VIP CHART</title>
    <style>
        :root { --dark-green: #0a3d0a; --gold: #FFD700; --vip-red: #e31e24; }
        body { background: #e8f5e9; font-family: 'Arial Narrow', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 4px solid var(--gold); }
        .header h1 { margin: 0; font-size: 22px; color: var(--gold); text-transform: uppercase; }

        .desc-box { background: var(--dark-green); color: #fff; width: 90%; margin: 20px auto; padding: 20px; border-radius: 15px; border: 3px solid var(--gold); }

        .btn-scroll { background: var(--dark-green); color: var(--gold); border: 2px solid var(--gold); padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 10px; }
        
        .chart-wrapper { width: 90%; margin: 10px auto; }
        .vip-table { border-collapse: collapse; width: 100%; min-width: 320px; background: #fff; }
        .vip-table td { border: 1px solid #000; height: 50px; text-align: center; }
        
        .btn-unlock-trigger { background: var(--vip-red); color: white; padding: 15px 30px; border-radius: 30px; border: 2px solid var(--gold); font-weight: bold; margin: 20px; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 320px; text-align: center; }
        .modal-input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; }
        #timerDisplay { font-size: 24px; font-weight: bold; color: var(--vip-red); margin-top: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>GOA SPECIAL VIP CHART</h1></div>

<div class="desc-box">
    <h3>📢 Hamari Vishesh Sewa</h3>
    <p>100% Sahi aur Tez Result.</p>
</div>

<button class="btn-scroll" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP ▲</button>

<div class="chart-wrapper">
    <table class="vip-table" id="chartGrid"></table>
</div>

<button class="btn-scroll" onclick="window.scrollTo({top:document.body.scrollHeight, behavior:'smooth'})">BOTTOM ▼</button>

<br>
<button class="btn-unlock-trigger" onclick="document.getElementById('modalStep2').style.display='flex'">🔓 REMOVE LOCK</button>

<div class="modal-overlay" id="modalStep2">
    <div class="modal-content" id="modalBody">
        <h3>Payment Details</h3>
        <p>Amount: 999</p>
        <img src="paytm-qr.png" alt="QR" style="width:150px; height:150px; border: 2px dashed #333;">
        <input type="text" id="userName" class="modal-input" placeholder="Apna Naam">
        <input type="tel" id="userPhone" class="modal-input" placeholder="Mobile Number">
        <input type="text" id="userUTR" class="modal-input" placeholder="UTR ID">
        <button id="submitBtn" style="width:95%; padding:10px; background:green; color:white; border:none; margin-top:10px;" onclick="startTimer()">SUBMIT</button>
        
        <div id="waitMsg" style="display:none; margin-top:10px;">Kripya pratiksha kare...</div>
        <div id="timerDisplay"></div>
    </div>
</div>

<script>
    function startTimer() {
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('waitMsg').style.display = 'block';
        let time = 120;
        let timer = setInterval(() => {
            let m = Math.floor(time/60);
            let s = time%60;
            document.getElementById('timerDisplay').innerHTML = (m<10?"0"+m:m) + ":" + (s<10?"0"+s:s);
            time--;
            if(time < 0) {
                clearInterval(timer);
                document.getElementById('modalBody').innerHTML = "<h2>SUCCESS!</h2><p>Payment Verified.</p>";
            }
        }, 1000);
    }

    // Chart Fetch Logic (Same as before)
    const CHART_URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart&v=" + Math.random();
    fetch(CHART_URL).then(r => r.text()).then(data => {
        const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
        let html = '';
        for(let i = 1; i < rows.length; i++) {
            html += `<tr><td>${rows[i][0].replace(/"/g, '')}</td>`;
            for(let j = 1; j <= 16; j += 3) {
                html += `<td>${(rows[i][j+1]||"").replace(/"/g, '').trim()}</td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('chartGrid').innerHTML = html;
    });
</script>
</body>
</html>
