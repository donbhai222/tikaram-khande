<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOA PINAL CHART</title>
    <style>
        /* साफ़ और स्पष्ट थीम */
        body { 
            background-color: #ffffff !important; 
            color: #000000 !important; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px;
        }

        .header { background-color: #1a024d; color: #FFD700; padding: 20px; border-radius: 10px; }
        
        #chartWrapper { 
            width: 100%; 
            margin: 20px auto; 
            overflow-x: auto; 
            border: 2px solid #000; 
        }

        table { width: 100%; border-collapse: collapse; background: #fff; }
        th { background: #FFD700; color: #000; padding: 10px; border: 1px solid #000; }
        td { border: 1px solid #000; height: 50px; text-align: center; }

        .btn-pay-main { 
            background-color: #e31e24; 
            color: #ffffff; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>GOA PINAL CHART</h1>
    </div>

    <div id="chartWrapper">
        <table>
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
                </tr>
            </thead>
            <tbody id="gridData">
                <tr>
                    <td>03-07</td>
                    <td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
                </tr>
            </tbody>
        </table>
    </div>

    <button class="btn-pay-main" onclick="alert('VIP सेक्शन')">JOIN VIP / लॉक खोलें</button>

</body>
</html>
