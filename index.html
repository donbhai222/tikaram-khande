<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>GOA PINAL CHART | Fast Results</title>
    <style>
        :root { 
            --bg-color: #0d0d0d; 
            --card-bg: #1a1a1a; 
            --gold: #FFD700; 
            --vip-red: #ff3e3e; 
            --text-color: #ffffff;
            --border-color: #333;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-bottom: 50px; 
        }
        
        .header { background: #000; padding: 20px; border-bottom: 3px solid var(--gold); }
        .header h1 { margin: 0; font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }

        .special-note { background: var(--card-bg); padding: 15px; margin: 15px auto; width: 90%; border-left: 5px solid var(--gold); border-radius: 8px; text-align: left; }
        .special-note p { font-size: 14px; color: #ccc; }

        .nav-btn { background: var(--gold); color: #000; border: none; border-radius: 20px; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 10px 0; }

        #chartWrapper { width: 95%; margin: 20px auto; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; overflow-x: auto; padding: 5px; }
        table { border-collapse: collapse; width: 100%; min-width: 300px; }
        th { background: var(--gold); color: #000; font-size: 12px; padding: 10px; border: 1px solid #000; }
        td { border: 1px solid #333; height: 60px; background: #111; vertical-align: middle; text-align: center; }
        
        .date-box { background: #222 !important; color: var(--gold); font-weight: bold; font-size: 11px; }
        .jodi { font-size: 20px; font-weight: 900; color: #fff; }
        .red-house .jodi, .red-house .panna-vertical { color: var(--vip-red) !important; }
        
        .btn-pay-main { background: var(--vip-red); color: white; padding: 15px; border: none; border-radius: 8px; width: 90%; font-weight: bold; font-size: 16px; margin: 20px 0; cursor: pointer; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        
        .sub-option { border: 2px solid #333; border-radius: 10px; padding: 15px; margin: 10px 0; cursor: pointer; background: #000; }
        .sub-option.active { border-color: var(--gold); background: #221e00; }
        .sub-price { color: var(--gold); font-weight: 900; font-size: 22px; display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #555; border-radius: 5px; background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
    </body>
</html>
