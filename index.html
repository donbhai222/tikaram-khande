<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER VIP CHART</title>
    <style>
        :root { --dark-green: #06402b; --gold: #FFD700; --vip-red: #e31e24; }
        body { background: #dcedc8; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--dark-green); padding: 15px; border-bottom: 3px solid var(--gold); color: var(--gold); }
        .welcome-box { background: #fff; padding: 10px; margin: 10px auto; width: 90%; border: 1px solid var(--dark-green); border-radius: 5px; }
        .welcome-box h2 { color: var(--dark-green); margin: 5px 0; }
        
        .chart-container { background: #fff; width: 95%; margin: 10px auto; overflow-x: auto; border: 1px solid #000; }
        .vip-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        .vip-table th { background: var(--dark-green); color: var(--gold); font-size: 10px; padding: 6px; border: 1px solid #000; }
        .vip-table td { border: 1px solid #000; height: 50px; text-align: center; }
        
        .p-vertical { display: flex; flex-direction: column; font-size: 8px; line-height: 0.9; font-weight: bold; }
        .j-main { font-size: 18px; font-weight: 900; }
        .cell-wrap { display: flex; align-items: center; justify-content: center; }
        
        .btn-unlock-trigger { background: var(--dark-green); color: white; padding: 12px 25px; border-radius: 30px; border: 2px solid var(--gold); cursor: pointer; margin: 20px; font-weight: bold; }
        
        /* Sticky Buttons */
        .scroll-sticky { position: fixed; bottom: 20px; right: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .btn-scroll { background: var(--dark-green); color: var(--gold); border: 2px solid var(--gold); padding: 8px; border-radius: 5px; cursor: pointer; font-size: 10px; font-weight: bold; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 350px; }
        .btn-action { background: var(--dark-green); color: var(--gold); padding: 10px; width: 100%; border: none; margin-top: 10px; cursor: pointer; }
        .timer-display { font-size: 30px; font-weight: bold; color: var(--vip-red); margin: 15px; }
    </style>
</head>
<body>

<div class="header"><h1>MASTER VIP CHART</h1></div>

<div class="welcome-box">
    <h2>स्वागत है भाई! 🙏</h2>
    <p style="font-size: 14px;">सबसे भरोसेमंद और सटीक VIP गेमिंग चार्ट। आज ही जुड़ें और अपना लॉस कवर करें!</p>
</div>

<div class="chart-container">
    <table class="vip-table">
        <thead>
            <tr><th>DATE</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th></tr>
        </thead>
        <tbody id="chartGrid"></tbody>
    </table>
</div>

<button class="btn-unlock-trigger" onclick="openModal('modalStep1')">🔓 REMOVE LOCK</button>

<div class="scroll-sticky">
    <button class="btn-scroll" onclick="window.scrollTo(0,0)">▲ TOP</button>
    <button class="btn-scroll" onclick="window.scrollTo(0,document.body.scrollHeight)">▼ BOTTOM</button>
</div>

<!-- Modal 1 -->
<div class="modal-overlay" id="modalStep1">
    <div class="modal-content">
        <h3>Unlock VIP Chart</h3>
        <input type="text" id="userName" placeholder="Naam" style="width:90%; padding:8px;">
        <input type="number" id="userPhone" placeholder="Mobile" style="width:90%; padding:8px; margin-top:5px;">
        <button class="btn-action" onclick="openModal('modalStep2')">Aage Badhein</button>
    </div>
</div>

<!-- Modal 2 -->
<div class="modal-overlay" id="modalStep2">
    <div class="modal-content">
        <h3>Select Plan</h3>
        <div style="border:1px solid #000; padding:10px; margin:5px;" onclick="openModal('modalStep3')">1 Din - ₹799</div>
        <div style="border:1px solid #000; padding:10px; margin:5px;" onclick="openModal('modalStep3')">5 Din - ₹1599</div>
    </div>
</div>

<!-- Modal 3 -->
<div class="modal-overlay" id="modalStep3">
    <div class="modal-content">
        <h3>Pay ₹799</h3>
        <img src="paytm-qr.png.jpeg" style="width:150px; height:150px; border:2px dashed #000;">
        <input type="text" id="utr" placeholder="Enter UTR ID" style="width:90%; padding:8px;">
        <button class="btn-action" onclick="startTimer()">Verify Payment</button>
    </div>
</div>

<!-- Modal 4 (Timer) -->
<div class="modal-overlay" id="modalStep4">
    <div class="modal-content">
        <h3>Verification...</h3>
        <div class="timer-display" id="timerBox">02:00</div>
        <div id="successMsg" style="display:none; color:green; font-weight:bold; font-size:20px;">🎉 SUCCESS!</div>
    </div>
</div>

<script>
    // Fetch Chart Data
    const CHART_URL = "https://docs.google.com/spreadsheets/d/1Oh9iZHT-QAhSTHDhP36qdqX38ZYJ-eivfr1VtyOExJA/gviz/tq?tqx=out:csv&sheet=Chart&v=" + Math.random();
    fetch(CHART_URL).then(r => r.text()).then(data => {
        const rows = data.split('\n').filter(r => r.trim() !== '').map(r => r.split(','));
        let html = '';
        for(let i = 1; i < rows.length; i++) {
            html += `<tr><td style="background:#f0f0f0;">${rows[i][0].replace(/"/g, '')}</td>`;
            for(let j = 1; j <= 16; j += 3) {
                let lp = (rows[i][j]||"").replace(/"/g, ''), jd = (rows[i][j+1]||"").replace(/"/g, ''), rp = (rows[i][j+2]||"").replace(/"/g, '');
                html += jd ? `<td><div class="cell-wrap"><div class="p-vertical">${lp.split('').map(n=>`<span>${n}</span>`).join('')}</div><div class="j-main">${jd}</div><div class="p-vertical">${rp.split('').map(n=>`<span>${n}</span>`).join('')}</div></div></td>` : `<td></td>`;
            }
            html += `</tr>`;
        }
        document.getElementById('chartGrid').innerHTML = html;
    });

    function openModal(id) {
        document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    function startTimer() {
        openModal('modalStep4');
        let timer = 120;
        let interval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            document.getElementById('timerBox').innerText = `0${m}:${s < 10 ? '0' : ''}${s}`;
            if (--timer < 0) {
                clearInterval(interval);
                document.getElementById('timerBox').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }
        }, 1000);
    }
</script>
</body>
</html>
